version: "3"

vars:
  IMAGE: ghcr.io/func-it/builder
  ALIAS: ghcr.io/func-it/protoc
  PLATFORMS: linux/amd64,linux/arm64
  DATE_TAG:
    sh: date -u +%Y-%m-%d

tasks:
  default:
    desc: Build + push multi-arch as builder:latest AND protoc:latest (back-compat alias).
    cmd: |
      docker buildx build --platform {{.PLATFORMS}} \
        -t {{.IMAGE}}:latest \
        -t {{.ALIAS}}:latest \
        . --push

  dry-build:
    desc: Local single-arch build (host arch) for testing — no push.
    cmd: docker build -t {{.IMAGE}}:dev .

  ensure:
    desc: Make sure {{.IMAGE}}:latest is available locally — pull from ghcr first, fall back to a local build if pull fails.
    silent: true
    cmds:
      - |
        if docker image inspect {{.IMAGE}}:latest >/dev/null 2>&1; then
          echo "✓ {{.IMAGE}}:latest already local — skipping pull/build"
          exit 0
        fi
        echo "▸ pulling {{.IMAGE}}:latest from ghcr.io"
        if docker pull {{.IMAGE}}:latest 2>&1 | tail -1; then
          echo "✓ pulled {{.IMAGE}}:latest"
          exit 0
        fi
        echo "  pull failed (offline / no auth?) — building locally for host arch"
        docker build -t {{.IMAGE}}:latest .
        echo "✓ built {{.IMAGE}}:latest locally"

  tag-versioned:
    desc: Build + push multi-arch with latest + YYYY-MM-DD tag (and protoc alias).
    cmd: |
      docker buildx build --platform {{.PLATFORMS}} \
        -t {{.IMAGE}}:latest \
        -t {{.IMAGE}}:{{.DATE_TAG}} \
        -t {{.ALIAS}}:latest \
        -t {{.ALIAS}}:{{.DATE_TAG}} \
        . --push
